<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Lineup Surf Forecast</title>
  <desc id="desc">A glowing ocean wave and rising sun for the Lineup surf forecast app.</desc>
  <defs>
    <linearGradient id="sky" x1="12" x2="52" y1="8" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.48" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="wave" x1="14" x2="55" y1="35" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="0.42" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="#020617"/>
  <circle cx="32" cy="32" r="28" fill="url(#sky)"/>
  <path fill="#fbbf24" d="M43 28a11 11 0 0 0-22 0h22Z" opacity="0.95"/>
  <path fill="#fef3c7" d="M22 28a10 10 0 0 1 20 0H22Z" opacity="0.4"/>
  <path fill="#020617" d="M6 36c8-7 16-8 24-4 9 4 15 2 28-6v32H6V36Z" opacity="0.52"/>
  <path fill="url(#wave)" filter="url(#glow)" d="M10 42c7-7 13-10 21-8 7 2 9 8 4 13-3 3-8 4-13 1 11 8 26 3 32-14 0 16-9 26-24 26-9 0-17-4-20-10v-8Z"/>
  <path fill="#ecfeff" d="M18 42c5-4 10-6 16-4 3 1 4 3 4 5-4-3-8-4-13-2-3 1-5 2-7 1Z" opacity="0.9"/>
  <path fill="none" stroke="#ecfeff" stroke-linecap="round" stroke-width="3" d="M20 51c8 4 18 3 25-3" opacity="0.62"/>
</svg>
