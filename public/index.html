  const single = renderHeroWindow(windows[safeIdx], '', safeIdx === 0 ? currentWindowText : '');
  const prevDisabled = safeIdx === 0 ? 'disabled' : '';
  const nextDisabled = safeIdx === windows.length - 1 ? 'disabled' : '';
  return `<div class="hero-window-carousel" role="region" aria-live="polite" aria-label="Best surf windows" tabindex="0">
    <button class="hero-window-nav hero-window-prev" type="button" aria-label="Previous window" ${prevDisabled}>${CHEVRON_LEFT_SVG}</button>
    ${single}
    <button class="hero-window-nav hero-window-next" type="button" aria-label="Next window" ${nextDisabled}>${CHEVRON_RIGHT_SVG}</button>
    <div class="hero-window-counter" aria-hidden="true">${safeIdx + 1} / ${windows.length}</div>
  </div>`;
}

function predictorTier(score) {
  const value = Number(score);
  if (Number.isFinite(value) && value >= 7.5) return 'gold';
  if (Number.isFinite(value) && value >= 6.2) return 'green';
  if (Number.isFinite(value) && value >= 5.0) return 'surfable';
  return 'low';
}

function predictorTierLabel(tier) {
  return {
    gold: 'excellent',
    green: 'good',
    surfable: 'surfable',
    low: 'low'
  }[tier] || 'low';
}

function predictorDisplayParts(win) {
  const label = String((win && win.label) || '');
  const firstSpace = label.indexOf(' ');
  if (firstSpace === -1) return { day: label || 'Window', time: '' };
  const day = label.slice(0, firstSpace);
  const range = label.slice(firstSpace + 1);
  const compactRange = range.replace(/:00/g, '');
  return { day, time: compactRange };
}

function predictorScoreText(score) {
  const value = Number(score);
  return Number.isFinite(value) ? `${value.toFixed(1)}/10` : '--/10';
}

function predictorScorePct(score) {
  const value = Number(score);
  if (!Number.isFinite(value)) return 6;
  return Math.max(6, Math.min(100, value * 10));
}

function sourceAverage(components, key) {
  const values = (components || [])
    .map(component => Number(component && component[key]))
    .filter(Number.isFinite);
  if (!values.length) return null;
  return values.reduce((sum, value) => sum + value, 0) / values.length;
}

const PREDICTOR_SOURCE_LABELS = [
  ['sf_score', 'SF'],
  ['surfline_score', 'Surfline'],
  ['windguru_score', 'Windguru'],
  ['om_score', 'OM'],
  ['gfs_score', 'GFS'],
  ['ibi_score', 'IBI']
];

function predictorSourceChips(win) {
  const components = Array.isArray(win && win.score_components) ? win.score_components : [];
  return PREDICTOR_SOURCE_LABELS
    .map(([key, label]) => {
      const avg = sourceAverage(components, key);
      if (avg == null) return '';
      return `<span class="hero-predictor-chip"><strong>${escapeHtml(label)}</strong> ${avg.toFixed(1)}</span>`;
    })
    .join('');
}

function predictorFactorChips(win) {
  const components = Array.isArray(win && win.score_components) ? win.score_components : [];
  const sourceOrder = ['om', 'gfs', 'surfline', 'windguru', 'ibi'];
  const factorOrder = ['height', 'period', 'wind', 'chop', 'direction', 'tide'];
  let factors = null;

  for (const component of components) {
    const factorScores = component && component.factor_scores;
    if (!factorScores || typeof factorScores !== 'object') continue;
    for (const source of sourceOrder) {
      if (factorScores[source] && typeof factorScores[source] === 'object') {
        factors = factorScores[source];
        break;
      }
    }
    if (factors) break;
  }

  if (!factors) return '';
  return factorOrder
    .map(key => {
      const value = Number(factors[key]);
      if (!Number.isFinite(value)) return '';
      return `<span class="hero-predictor-chip"><strong>${escapeHtml(key)}</strong> ${value.toFixed(2)}</span>`;
    })
    .join('');
}

function predictorTideLabel(win) {
  const components = Array.isArray(win && win.score_components) ? win.score_components : [];
  const tide = components.find(component => component && component.tide);
  return tide && tide.tide ? tide.tide : '';
}

function predictorAriaLabel(win) {
  const tier = predictorTier(win && win.score);
  const value = Number(win && win.score);
  const score = Number.isFinite(value) ? value.toFixed(1) : 'unknown';
  const blocked = Array.isArray(win && win.blocked_by) && win.blocked_by.length
    ? `, blocked by ${win.blocked_by.join(', ')}`
    : '';
  return `${(win && win.label) || 'Surf window'}, score ${score} out of 10, ${predictorTierLabel(tier)} rating${blocked}`;
}

function renderPredictorBar(win, idx, selected) {
  const tier = predictorTier(win && win.score);
  const parts = predictorDisplayParts(win);
  const scoreText = predictorScoreText(win && win.score);
  const scorePct = predictorScorePct(win && win.score);
  const reason = (win && win.reason) || '';
  const tooltip = `<span class="hero-predictor-tooltip" role="tooltip">
    <strong>${escapeHtml((win && win.label) || 'Surf window')} - ${escapeHtml(scoreText)}</strong>
    ${escapeHtml(reason || predictorTierLabel(tier))}
  </span>`;

  return `<button class="hero-predictor-bar" type="button" data-index="${idx}" aria-pressed="${selected ? 'true' : 'false'}" aria-label="${escapeHtml(predictorAriaLabel(win))}">
    <span class="hero-predictor-meter" aria-hidden="true">
      <span class="hero-predictor-fill" data-tier="${escapeHtml(tier)}" style="--score-pct: ${scorePct.toFixed(0)}%"></span>
    </span>
    <span class="hero-predictor-labels" aria-hidden="true">
      <span class="hero-predictor-day">${escapeHtml(parts.day)}</span>
      <span class="hero-predictor-time">${escapeHtml(parts.time)}</span>
    </span>
    ${tooltip}
  </button>`;
}

function renderPredictorDetail(win) {
  if (!win) return '';
  const tier = predictorTier(win.score);
  const confidence = win.confidence ? `<span class="hero-predictor-chip"><strong>confidence</strong> ${escapeHtml(win.confidence)}</span>` : '';
  const detail = win.confidence_detail || {};
  const sourceCount = Number.isFinite(Number(detail.source_count))
    ? `<span class="hero-predictor-chip"><strong>sources</strong> ${escapeHtml(detail.source_count)}</span>`
    : '';
  const missing = Array.isArray(detail.missing_sources) && detail.missing_sources.length
    ? `<span class="hero-predictor-chip"><strong>missing</strong> ${escapeHtml(detail.missing_sources.slice(0, 3).join(', '))}${detail.missing_sources.length > 3 ? '...' : ''}</span>`
    : '';
  const tide = predictorTideLabel(win);
  const tideChip = tide ? `<span class="hero-predictor-chip"><strong>tide</strong> ${escapeHtml(tide)}</span>` : '';
  const blocked = Array.isArray(win.blocked_by) && win.blocked_by.length
    ? `<span class="hero-predictor-chip is-blocked"><strong>blocked</strong> ${escapeHtml(win.blocked_by.join(', '))}</span>`
    : '';
  const sourceChips = predictorSourceChips(win);
  const factorChips = predictorFactorChips(win);
  const reason = win.reason || 'Scored window in the seven-day predictor.';

  return `<div class="hero-predictor-detail" role="region" aria-live="polite">
    <div class="hero-predictor-detail-top">
      <div>
        <div class="hero-predictor-detail-time">${escapeHtml(win.label || 'Surf window')}</div>
        <div class="hero-predictor-detail-reason">${escapeHtml(reason)}</div>
      </div>
      <div class="hero-predictor-detail-score" data-tier="${escapeHtml(tier)}">${escapeHtml(predictorScoreText(win.score))}</div>
    </div>
    <div class="hero-predictor-chips">
      ${confidence}${sourceCount}${missing}${tideChip}${blocked}${sourceChips}${factorChips}
    </div>
  </div>`;
}

function renderPredictorRibbon(windows, selectedIndex = 0) {
  if (!Array.isArray(windows) || !windows.length) return '';
  const safeIdx = Math.max(0, Math.min(selectedIndex, windows.length - 1));
  return `<div class="hero-predictor" aria-label="Seven day surf score predictor">
    <div class="hero-predictor-head">
      <div class="hero-predictor-title">7-day predictor</div>
      <div class="hero-predictor-count">${windows.length} windows</div>
    </div>
    <div class="hero-predictor-track">
      ${windows.map((win, idx) => renderPredictorBar(win, idx, idx === safeIdx)).join('')}
    </div>
    ${renderPredictorDetail(windows[safeIdx])}
  </div>`;
}

function renderUnifiedHero(data) {
  const u = data.unified;
  if (!u) return '';

  const tier = ['gold', 'green', 'yellow', 'red'].includes(u.tier) ? u.tier : 'yellow';
  const badge = {
    gold: 'GOLD',
    green: 'GO',
    yellow: 'WAIT',
    red: 'SKIP'
  }[tier];

  const topWindows = Array.isArray(u.top_windows) && u.top_windows.length
    ? u.top_windows
    : (u.best_window ? [u.best_window]
       : (u.next_decent_window ? [u.next_decent_window]
          : (u.next_gold_window ? [u.next_gold_window] : [])));

  let currentWindowText = '';
  if (u.current_window_ends && u.decision === 'go') {
    const end = hhmmFromIso(u.current_window_ends);
    currentWindowText = end ? `Open until ${end}` : 'Open now';
  }

  const heroIndex = 0;
  const windowHtml = topWindows.length
    ? renderHeroWindowCarousel(topWindows, heroIndex, currentWindowText)
    : renderHeroWindow(null, 'No clean window found in the next 7 days.', currentWindowText);
  const predictorWindows = Array.isArray(u.predictor_windows) ? u.predictor_windows : [];
  const predictorHtml = renderPredictorRibbon(predictorWindows, 0);
  const reason = u.decision_reason || u.agreement_note || '';
  const reasonHtml = reason
    ? `<div class="hero-reason">${escapeHtml(reason)}</div>`
    : '';

  const heroState = JSON.stringify({ windows: topWindows, predictorWindows, currentWindowText });
  return `<div class="hero-card tier-${escapeHtml(tier)}" data-hero-state="${escapeHtml(heroState)}" data-hero-index="0" data-predictor-index="0">
    <div class="hero-tier-badge">${escapeHtml(badge)}</div>
    <div class="hero-headline">${escapeHtml(u.decision_headline || 'WAIT FOR A BETTER WINDOW')}</div>
    <div class="hero-summary">${escapeHtml(u.plain_summary || '')}</div>
    ${reasonHtml}
    <div class="hero-window-slot">${windowHtml}</div>
    <div class="hero-predictor-slot">${predictorHtml}</div>
    <button class="hero-toggle-details" type="button" aria-expanded="false">Show technical details ▾</button>
  </div>`;
}

function _heroState(card) {
  try {
    return JSON.parse(card.getAttribute('data-hero-state') || '{}');
  } catch (_) {
    return {};
  }
}

function _renderHeroSlot(card) {
  const state = _heroState(card);
  const windows = Array.isArray(state.windows) ? state.windows : [];
  const predictorWindows = Array.isArray(state.predictorWindows) ? state.predictorWindows : [];
  const slot = card.querySelector('.hero-window-slot');
  const predictorSlot = card.querySelector('.hero-predictor-slot');
  if (slot) {
    const idx = Number(card.getAttribute('data-hero-index')) || 0;
    if (windows.length) {
      slot.innerHTML = renderHeroWindowCarousel(windows, idx, state.currentWindowText || '');
    } else {
      slot.innerHTML = renderHeroWindow(null, 'No clean window found in the next 7 days.', state.currentWindowText || '');
    }
  }

  if (predictorSlot) {
    const predictorIdx = Number(card.getAttribute('data-predictor-index')) || 0;
    predictorSlot.innerHTML = renderPredictorRibbon(predictorWindows, predictorIdx);
  }

  // Move keyboard focus back onto the carousel container so screen readers
  // re-announce the live region after navigation.
  const carousel = slot && slot.querySelector('.hero-window-carousel');
  if (carousel && card.dataset.heroFocusPending === '1') {
    carousel.focus({ preventScroll: true });
    card.dataset.heroFocusPending = '0';
  }

  const predictor = predictorSlot && predictorSlot.querySelector('.hero-predictor-bar[aria-pressed="true"]');
  if (predictor && card.dataset.predictorFocusPending === '1') {
    predictor.focus({ preventScroll: true });
    predictor.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    card.dataset.predictorFocusPending = '0';
  }
}

function _heroStep(card, delta) {
  const state = _heroState(card);
  const windows = Array.isArray(state.windows) ? state.windows : [];
  if (windows.length <= 1) return;
  const cur = Number(card.getAttribute('data-hero-index')) || 0;
  const next = Math.max(0, Math.min(windows.length - 1, cur + delta));
  if (next === cur) return;
  card.setAttribute('data-hero-index', String(next));
  card.dataset.heroFocusPending = '1';
  _renderHeroSlot(card);
}

function _predictorStep(card, delta) {
  const state = _heroState(card);
  const windows = Array.isArray(state.predictorWindows) ? state.predictorWindows : [];
  if (windows.length <= 1) return;
  const cur = Number(card.getAttribute('data-predictor-index')) || 0;
  const next = Math.max(0, Math.min(windows.length - 1, cur + delta));
  if (next === cur) return;
  card.setAttribute('data-predictor-index', String(next));
  card.dataset.predictorFocusPending = '1';
  _renderHeroSlot(card);
}

function bindUnifiedHero(card) {
  const btn = card.querySelector('.hero-toggle-details');
  if (btn) {
    btn.addEventListener('click', (e) => {
      const details = card.querySelector('.card-details');
      if (!details) return;
      const expanded = details.hidden;
      details.hidden = !expanded;
      e.currentTarget.textContent = expanded ? 'Hide technical details ▴' : 'Show technical details ▾';
      e.currentTarget.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    });
  }

  // data-hero-state / data-hero-index live on .hero-card, not on the outer .card container
  const heroCard = card.querySelector('.hero-card') || card;
  const slot = card.querySelector('.hero-window-slot');
  if (slot) {
    slot.addEventListener('click', (e) => {
      const prev = e.target.closest('.hero-window-prev');
      const next = e.target.closest('.hero-window-next');
      if (prev && !prev.disabled) { _heroStep(heroCard, -1); }
      else if (next && !next.disabled) { _heroStep(heroCard, 1); }
    });
    slot.addEventListener('keydown', (e) => {
      if (!e.target.closest('.hero-window-carousel')) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); _heroStep(heroCard, -1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); _heroStep(heroCard, 1); }
    });
  }

  const predictorSlot = card.querySelector('.hero-predictor-slot');
  if (predictorSlot) {
    predictorSlot.addEventListener('click', (e) => {
      const bar = e.target.closest('.hero-predictor-bar');
      if (!bar) return;
      heroCard.setAttribute('data-predictor-index', bar.dataset.index || '0');
      _renderHeroSlot(heroCard);
    });
    predictorSlot.addEventListener('keydown', (e) => {
      const bar = e.target.closest('.hero-predictor-bar');
      if (!bar) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        _predictorStep(heroCard, -1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        _predictorStep(heroCard, 1);
      }
    });
  }
}

function renderCard(spot, data) {
  const card = document.getElementById('card-' + spot.id);
  if (!card) return;
  const time = data.fetched_at
    ? new Date(data.fetched_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
    : '—';
  const verdictClass = data.verdict || 'empty';
  const ratingDisplay = (data.rating != null) ? data.rating + '/10' : '—';
  const tideDisplay = data.tide && data.tide.summary ? data.tide.summary : '—';
  const detailsHidden = data.unified ? ' hidden' : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="spot-name">${escapeHtml(spot.name)}</div>
      <div class="last-sync">synced ${time}</div>
    </div>
    ${renderUnifiedHero(data)}
    <div class="card-details"${detailsHidden}>
      <div class="verdict ${verdictClass}">${escapeHtml(data.verdict_text)}</div>
      <div class="params">
        <div class="param-label">Height</div><div></div>
        <div class="param-value">${escapeHtml(fmt(data.height_m, 'm'))}</div>
        <div class="param-label">Period</div><div></div>
        <div class="param-value">${escapeHtml(fmt(data.period_s, 's'))}</div>
        <div class="param-label">Swell from</div><div></div>
        <div class="param-value">${escapeHtml(fmt(data.swell_direction))}</div>
        <div class="param-label">Wind</div><div></div>
        <div class="param-value">${escapeHtml(fmt(data.wind_state))}</div>
        <div class="param-label">Tide</div><div></div>
        <div class="param-value tide-value">${escapeHtml(tideDisplay)}</div>
        <div class="param-label">Site rating</div><div></div>
        <div class="param-value muted">${escapeHtml(ratingDisplay)}</div>
      </div>
      ${renderSourcesLine(data)}
      ${renderOmPanel(data)}
      ${renderGfsPanel(data)}
      ${renderIbiPanel(data)}
      ${renderForecastStrip(data)}
      <div class="explanations">
        <h3>Why?</h3>
        <ul>
          ${(data.details || []).map(d => `
            <li class="${escapeHtml(d.color)}">
              <span><strong>${escapeHtml(d.label)}:</strong> ${escapeHtml(d.explanation)}</span>
            </li>`).join('')}
        </ul>
      </div>
      <div class="extras">
        <span class="extras-info">${
          data.wetsuit
            ? ICON_DROPLET + '<span>' + escapeHtml(data.wetsuit) + '</span>'
            : (data.sea_temp_c != null
                ? ICON_DROPLET + '<span>' + escapeHtml(data.sea_temp_c) + '°C water</span>'
                : '')
        }</span>
        <a class="url-link" href="${escapeHtml(spot.url)}" target="_blank" rel="noopener">View on surf-forecast.com ${ICON_EXTERNAL}</a>
      </div>
    </div>
    ${renderWebcam(spot)}`;
  bindUnifiedHero(card);
  bindForecastStripInteractions(card, data);
  initWebcam(spot);
}

function friendlyError(err) {
  const message = err && err.message ? err.message : String(err);
  if (err instanceof TypeError || /Failed to fetch|NetworkError|Load failed/i.test(message)) {
    if (LOCAL_SERVER) {
      return `Local server is not reachable. Run "python server.py" in this folder, then open http://127.0.0.1:8765. (${message})`;
    }
    return `Couldn't fetch forecast — check your connection and try again. (${message})`;
  }
  return message;
}

async function syncAll() {
  SPOTS.forEach(s => setLoading(s.id));

  await Promise.all(SPOTS.map(async (spot) => {
    try {
      const data = await scrape(spot);
      renderCard(spot, data);
    } catch (err) {
      renderError(spot, `Couldn't fetch forecast: ${friendlyError(err)}`);
    }
  }));
}

const levelSelect = document.getElementById('levelSelect');
levelSelect.value = currentLevel;
levelSelect.addEventListener('change', () => {
  const next = levelSelect.value;
  if (!VALID_LEVELS.includes(next) || next === currentLevel) return;
  currentLevel = next;
  localStorage.setItem(LEVEL_STORAGE_KEY, currentLevel);
  syncAll();
});

function initSiteCredit() {
  const link = document.querySelector('.site-credit-link');
  if (!link) return;

  const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
  const initialDelayMs = 1500;
  let replayTimer = null;
  let initialTimer = null;

  const playTypewriter = () => {
    link.classList.remove('is-pending');
    if (motionQuery.matches) {
      link.classList.remove('is-typing');
      return;
    }
    link.classList.remove('is-typing');
    void link.offsetWidth;
    link.classList.add('is-typing');
  };

  const scheduleReplay = () => {
    if (replayTimer) window.clearInterval(replayTimer);
    if (!motionQuery.matches) {
      replayTimer = window.setInterval(playTypewriter, 60000);
    }
  };

  initialTimer = window.setTimeout(playTypewriter, initialDelayMs);
  scheduleReplay();

  const onMotionChange = () => {
    if (initialTimer) {
      window.clearTimeout(initialTimer);
      initialTimer = null;
    }
    playTypewriter();
    scheduleReplay();
  };

  if (motionQuery.addEventListener) {
    motionQuery.addEventListener('change', onMotionChange);
  } else if (motionQuery.addListener) {
    motionQuery.addListener(onMotionChange);
  }
}

initSiteCredit();
renderEmpty();
syncAll();
</script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
